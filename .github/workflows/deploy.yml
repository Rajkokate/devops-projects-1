name: Deploy to EKS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: <OIDC_ROLE>
        aws-region: ap-south-1

    - name: Build & Push
      run: |
        docker build -t myapp .
        docker tag myapp:latest <ECR_URI>
        docker push <ECR_URI>

    - name: Deploy to EKS
      run: |
        aws eks update-kubeconfig --name my-cluster
        kubectl apply -f k8s/
